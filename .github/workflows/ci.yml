name: CI

on:
  push:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: contas
          POSTGRES_PASSWORD: contas
          POSTGRES_DB: contas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U contas -d contas_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      CONTAS_TEST_DATABASE_URL: postgres://contas:contas@localhost:5432/contas_test?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1 -v

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
