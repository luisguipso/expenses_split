services:
  db:
    image: postgres:16-alpine
    container_name: contas-db
    environment:
      POSTGRES_USER: contas
      POSTGRES_PASSWORD: contas
      POSTGRES_DB: contas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contas"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    container_name: contas-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contas-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://contas:contas@db:5432/contas?sslmode=disable
      JWT_SECRET: dev-secret-change-in-production
      FRONTEND_URL: http://localhost:8080
      PORT: "8080"
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: noreply@contas.app
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started

volumes:
  pgdata:
